<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>求職者データベース登録フォーム</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="form-page">
    <header class="form-header">
      <div class="container">
        <h1>求職者データベース登録フォーム</h1>
        <p class="subtitle">
          以下のフォームに必要事項をご入力ください。送信内容は求職者データベースに登録されます。
        </p>
      </div>
    </header>

    <main class="container">
      <section class="notice-card">
        <h2>ご登録前にご確認ください</h2>
        <ul>
          <li>すべての項目は必須です。</li>
          <li>入力内容は採用・職業紹介の目的で利用します。</li>
          <li>連絡可能なメッセンジャー情報を正確にご記入ください。</li>
        </ul>

        <div class="consent-links">
          <a href="../privacy.html" target="_blank" class="text-link">個人情報同意文書を見る</a>
          <span class="divider">|</span>
          <a href="../index.html" class="text-link">もとのページに戻る</a>
        </div>
      </section>

      <section class="form-card">
        <div class="form-card-header">
          <h2>登録フォーム</h2>
          <p>下の埋め込みフォームから登録できます。</p>
        </div>

        <div class="iframe-wrapper">
          <iframe
            src="https://airtable.com/embed/appiZvMaNcfGEIxPA/pagqGWlfyr8RnxRhd/form"
            frameborder="0"
            width="100%"
            height="1250"
            style="background: transparent; border: none;"
            allowfullscreen>
          </iframe>
        </div>
      </section>

      <section class="bottom-actions">
        <a href="../index.html" class="back-btn">← もとのページに戻る</a>
        <a href="../privacy.html" target="_blank" class="privacy-btn">個人情報同意文書</a>
      </section>
    </main>
  </div>
</body>
</html>
