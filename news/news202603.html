<h1>在留資格手続き手数料引き上げ法案を検討</h1>

<p class="news-date">2026年3月</p>

<p>
政府は外国人受入れ拡大に伴い、
在留資格変更・更新などの手続き手数料の
引き上げを検討しています。
</p>

<h2>背景</h2>

<p>
外国人労働者数の増加により、
入管手続きの件数が大幅に増えており
制度の見直しが議論されています。
</p>

<h2>企業・外国人への影響</h2>

<p>
手数料の改定が実施された場合、
企業や外国人本人の負担が
増える可能性があります。
</p>
